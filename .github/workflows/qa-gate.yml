name: QA Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  statuses: write

jobs:
  qa-approved:
    runs-on: ubuntu-latest
    steps:
      - name: Set QA status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          # LABELS comes via env so apostrophes in label names don't
          # break the shell-literal wrapping.
          if echo "$LABELS" | grep -q '"QA Approved"'; then
            STATE="success"
            DESC="QA testing completed"
          else
            STATE="pending"
            DESC="Waiting for QA — add 'QA Approved' label when testing is complete"
          fi
          gh api "repos/$REPO/statuses/$HEAD_SHA" \
            --method POST \
            -f state="$STATE" \
            -f description="$DESC" \
            -f context="QA Gate"
