name: PR Label Automation (CI)

# Handles label transitions when CI completes (pass or fail).
# Split from pr-labels.yml because workflow_run fires on every CI
# completion (including merges to main), which caused noisy failures
# when there was no associated PR.
#
# NOTE: References the CI workflow by name ("CI").
# If the CI workflow in ci.yml is ever renamed, update the name here too.
#
# LIMITATION: workflow_run triggers always run from the default branch
# (main), not the PR branch. Changes to this file cannot be tested
# on a PR — they take effect only after merge.
#
# The workflow_dispatch trigger is present so the file can be exercised
# manually (Actions tab -> Run workflow). This serves two purposes:
#
#   1. Seeding: when this file is first introduced to a repo, the
#      workflow_run dispatcher doesn't always register the listener
#      until the workflow has had at least one non-startup-failure run.
#      Running it once via workflow_dispatch produces a clean skipped
#      run (the if: guards below don't match a workflow_dispatch
#      event), which primes the dispatcher. Without this, every
#      subsequent PR sticks at Awaiting CI because on-ci-pass never
#      fires.
#   2. Debugging: lets a maintainer trigger the workflow manually to
#      inspect conditional logic, without having to piggyback on a
#      real CI run.
on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  pull-requests: write
  checks: read

jobs:
  # When CI passes on a PR branch, promote from Awaiting CI to Ready for QA.
  # Skips if Dev Active is present (dev isn't done yet).
  on-ci-pass:
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'pull_request'
      && github.event.workflow_run.head_branch != github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - name: Promote to Ready for QA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Read workflow_run fields directly from the event payload on disk.
          # $GITHUB_EVENT_PATH is always set on GitHub-hosted runners.
          # Going through jq -r avoids the GitHub Actions expression surface
          # entirely (which previously broke queue-time parsing on
          # workflow_dispatch / push validation because GHA substitutes
          # dollar-brace-brace sequences in run blocks *before* the shell
          # sees them — including sequences inside shell comments).
          # jq is pre-installed on ubuntu-latest.
          # Shell-injection safety: jq -r writes raw bytes into a shell
          # variable via command substitution, and every subsequent use is
          # double-quoted — same guarantee as the prior env: pattern.
          RUN_ID=$(jq -r '.workflow_run.id // empty' "$GITHUB_EVENT_PATH")
          HEAD_BRANCH=$(jq -r '.workflow_run.head_branch // empty' "$GITHUB_EVENT_PATH")

          # Defensive: the job-level if: already filters to workflow_run
          # events with a usable payload, but if somehow we land here with
          # no RUN_ID (e.g. someone loosens the if: later), early-exit.
          if [ -z "$RUN_ID" ]; then
            echo "No workflow_run payload — exiting"
            exit 0
          fi

          # Look up the associated PR.
          # The API can 404 after a force-push (orphaned run).
          # Capture output only on success so 404 body doesn't leak into $PR.
          PR=""
          API_OUT=$(gh api "repos/$REPO/actions/runs/$RUN_ID/pull_requests" \
            --jq '.[0].number // empty' 2>&1) && PR="$API_OUT" || true

          # Fallback: pull_requests array is empty for dependabot PRs.
          # Search by head branch instead. HEAD_BRANCH came from jq (above),
          # not a direct GHA expression — fork PR branch names are
          # contributor-controlled and allow shell metacharacters.
          if [ -z "$PR" ]; then
            PR=$(gh pr list --repo "$REPO" --head "$HEAD_BRANCH" --state open \
              --json number --jq '.[0].number // empty' 2>/dev/null) || true
          fi

          if [ -z "$PR" ]; then
            echo "No PR associated with this workflow run — exiting"
            exit 0
          fi

          LABELS=$(gh pr view "$PR" --repo "$REPO" --json labels --jq '.labels[].name')

          # Dev Active means dev isn't done — don't promote.
          # on-unlabel will handle promotion when Dev Active is removed.
          if echo "$LABELS" | grep -q "^Dev Active$"; then
            echo "Dev Active present — skipping promotion"
            exit 0
          fi

          # Promote if Awaiting CI is present
          if echo "$LABELS" | grep -q "^Awaiting CI$"; then
            REMOVE="Awaiting CI"
            if echo "$LABELS" | grep -q "^CI Failed$"; then
              REMOVE="Awaiting CI,CI Failed"
            fi
            gh pr edit "$PR" --repo "$REPO" --remove-label "$REMOVE"
            gh pr edit "$PR" --repo "$REPO" --add-label "Ready for QA"
          fi

  # When CI fails on a PR branch, set CI Failed.
  # Skips if Dev Active is present (dev is already working).
  on-ci-fail:
    if: >-
      github.event.workflow_run.conclusion == 'failure'
      && github.event.workflow_run.event == 'pull_request'
      && github.event.workflow_run.head_branch != github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - name: Set CI Failed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # See on-ci-pass for the rationale behind reading workflow_run
          # fields from $GITHUB_EVENT_PATH via jq rather than env: expressions.
          RUN_ID=$(jq -r '.workflow_run.id // empty' "$GITHUB_EVENT_PATH")
          HEAD_BRANCH=$(jq -r '.workflow_run.head_branch // empty' "$GITHUB_EVENT_PATH")

          if [ -z "$RUN_ID" ]; then
            echo "No workflow_run payload — exiting"
            exit 0
          fi

          PR=""
          API_OUT=$(gh api "repos/$REPO/actions/runs/$RUN_ID/pull_requests" \
            --jq '.[0].number // empty' 2>&1) && PR="$API_OUT" || true

          # HEAD_BRANCH came from jq (above), not a direct GHA expression —
          # fork PR branch names are contributor-controlled.
          if [ -z "$PR" ]; then
            PR=$(gh pr list --repo "$REPO" --head "$HEAD_BRANCH" --state open \
              --json number --jq '.[0].number // empty' 2>/dev/null) || true
          fi

          if [ -z "$PR" ]; then
            echo "No PR associated with this workflow run — exiting"
            exit 0
          fi

          LABELS=$(gh pr view "$PR" --repo "$REPO" --json labels --jq '.labels[].name')

          # Dev Active means dev is already working — don't add CI Failed
          if echo "$LABELS" | grep -q "^Dev Active$"; then
            echo "Dev Active present — skipping CI Failed"
            exit 0
          fi

          # Set CI Failed if Awaiting CI is present (normal flow)
          if echo "$LABELS" | grep -q "^Awaiting CI$"; then
            gh pr edit "$PR" --repo "$REPO" --remove-label "Awaiting CI"
            gh pr edit "$PR" --repo "$REPO" --add-label "CI Failed"
          fi
