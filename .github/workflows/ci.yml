name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Generate PyPI README (strip TOC)
        run: |
          python -c "
          import re
          from pathlib import Path
          src = Path('README.md').read_text(encoding='utf-8')
          cleaned = re.sub(r'\n---\n.*?\n---\n', '\n\n', src, count=1, flags=re.DOTALL)
          Path('README-pypi.md').write_text(cleaned, encoding='utf-8')
          "

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  smoke-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Generate PyPI README (strip TOC)
        run: |
          python -c "
          import re
          from pathlib import Path
          src = Path('README.md').read_text(encoding='utf-8')
          cleaned = re.sub(r'\n---\n.*?\n---\n', '\n\n', src, count=1, flags=re.DOTALL)
          Path('README-pypi.md').write_text(cleaned, encoding='utf-8')
          "

      - name: Install package
        run: uv tool install .

      - name: Smoke test CLI
        run: |
          yt-dont-recommend --version
          yt-dont-recommend --help
          yt-dont-recommend --list-sources
          yt-dont-recommend --schedule status
