name: Sync Labels

# Syncs GitHub labels from .github/labels.yml (source of truth).
# Runs on push to main that modifies the label file, or on-demand.
# delete-other-labels is false, so ad-hoc UI labels are preserved; flip
# it to true once the label set in labels.yml is truly canonical.

on:
  push:
    branches: [main]
    paths:
      - ".github/labels.yml"
      - ".github/workflows/sync-labels.yml"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Pinned to a SHA on upstream main because the latest tagged release
      # (v2.3.3, Feb 2024) still runs on Node 20. Upstream's Node 24 update
      # merged 2026-04-10 (EndBug/label-sync#316) but no v2.3.4 tag has been
      # cut yet. Re-evaluate to a release tag once upstream cuts one.
      - uses: EndBug/label-sync@1cd399a63f3d27e0a890cec8d1c29efad3e5db3d # main 2026-04-25 (Node 24)
        with:
          config-file: .github/labels.yml
          delete-other-labels: false
