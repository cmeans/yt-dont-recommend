# config.yaml — yt-dont-recommend configuration
#
# Copy this file to ~/.yt-dont-recommend/config.yaml and edit.
# All keys are optional — omitted keys fall back to built-in defaults.
# Requires: pip install pyyaml  (or pip install yt-dont-recommend[clickbait])

timing:
  # Delay between individual actions (seconds). A random value between
  # min_delay and max_delay is chosen for each action.
  min_delay: 3.0        # default: 3.0
  max_delay: 7.0        # default: 7.0

  # After this many blocks, take a longer break (reduces rate-limit risk).
  long_pause_every: 25  # default: 25
  long_pause_seconds: 30 # default: 30  (actual pause is ±20% of this value; range: 24–36s)

  # Extra wait after navigating to a new page (seconds).
  page_load_wait: 3.0   # default: 3.0

  # Maximum actions (blocks + clickbait marks) per session.
  # Use --no-limit on the command line to override for a single run.
  session_cap: 75       # default: 75

browser:
  # Use the system-installed Google Chrome instead of Playwright's bundled Chromium.
  # System Chrome produces an authentic User-Agent and Client Hints, which improves
  # anti-detection. Falls back to bundled Chromium automatically if Chrome is not found.
  # Set to false if you need reproducible behaviour or don't have Chrome installed.
  use_system_chrome: true  # default: true

schedule:
  # Default frequency for --schedule install when no --blocklist-runs /
  # --clickbait-runs flags are provided on the command line.
  # Values of 0 mean that mode is not scheduled.
  blocklist_runs: 2   # times per day to run blocklist mode (default: 0)
  clickbait_runs: 0   # times per day to run clickbait mode (default: 0)

  # Whether scheduled (heartbeat-spawned) runs use --headless.
  # Set to false only if you need to see the browser window during scheduled runs.
  headless: true      # default: true

# Selector overrides — YouTube changes its DOM frequently.
# If selectors break, run --check-selectors to diagnose, then override here.
# Only uncomment the selectors you need to change.
# A future --check-selectors --repair will auto-populate this section.
